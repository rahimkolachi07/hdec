<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HDEC CMMS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Sora',sans-serif}
body{background:#08091a;color:#e8ecf4;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.login-wrap{width:100%;max-width:400px}
.logo-row{text-align:center;margin-bottom:32px}
.logo-icon{width:60px;height:60px;background:linear-gradient(135deg,#8a1010,#b81818);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 0 30px rgba(138,16,16,.4)}
.logo-icon svg{opacity:.9}
.company{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#e5ad1a;letter-spacing:1px;margin-bottom:4px}
.project{font-size:12px;color:#6070a0;letter-spacing:.3px}
.card{background:#101428;border:1px solid #1e2a44;border-radius:16px;padding:24px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#8a1010,#e5ad1a,#2888cc)}
h2{font-size:20px;font-weight:700;color:#e8ecf4;margin-bottom:6px}
.sub{font-size:13px;color:#6070a0;margin-bottom:28px}
label{display:block;font-size:11px;font-weight:700;color:#a0aec8;letter-spacing:.8px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:6px}
input[type=text],input[type=password]{
  width:100%;background:#151a30;border:1px solid #1e2a44;border-radius:10px;
  padding:12px 16px;font-size:14px;color:#e8ecf4;font-family:'Sora',sans-serif;
  outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:18px
}
input[type=text]:focus,input[type=password]:focus{border-color:#e5ad1a;box-shadow:0 0 0 3px rgba(229,173,26,.1)}
input::placeholder{color:#2a3858}
.btn{width:100%;background:linear-gradient(135deg,#8a1010,#b81818);border:none;border-radius:10px;padding:14px;color:#f0e0d8;font-size:15px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;transition:opacity .2s,transform .1s;letter-spacing:.3px}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.error{background:rgba(184,48,48,.12);border:1px solid rgba(217,64,64,.3);border-radius:9px;padding:11px 14px;color:#d94040;font-size:13px;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.footer{text-align:center;margin-top:20px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#2a3858;letter-spacing:.5px}
.field-group{margin-bottom:4px}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-row">
    <div class="logo-icon">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <circle cx="15" cy="15" r="6" fill="rgba(255,255,255,.2)"/>
        <line x1="15" y1="3" x2="15" y2="7" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="15" y1="23" x2="15" y2="27" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="3" y1="15" x2="7" y2="15" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="23" y1="15" x2="27" y2="15" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="6" y1="6" x2="9" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="21" y1="21" x2="24" y2="24" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="6" y1="24" x2="9" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="21" y1="9" x2="24" y2="6" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="company">POWER CHINA HDEC</div>
    <div class="project">Al Henakiya 1100 MW Solar Power Plant</div>
  </div>

  <div class="card">
    <h2>Sign In</h2>
    <p class="sub">Enter your credentials to access HDEC CMMS</p>

    {% if error %}
    <div class="error">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#d94040" stroke-width="1.4"/><path d="M8 5v4M8 10.5v.5" stroke="#d94040" stroke-width="1.5" stroke-linecap="round"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login/?next={{ request.GET.next }}">
      {% csrf_token %}
      <div class="field-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" autofocus autocomplete="username">
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn">Sign In to CMMS</button>
    </form>
  </div>

  <div class="footer">HDEC CMMS v3.0 &middot; March 2026 &middot; Confidential</div>
</div>
</body>
</html>
